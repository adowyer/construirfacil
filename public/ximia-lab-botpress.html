<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Ximia · Lab (no público)</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #0b0b0c; color: #e8e8ea; display: grid; place-items: center; min-height: 100vh; }
    .card { max-width: 560px; padding: 40px; text-align: center; }
    h1 { font-weight: 600; letter-spacing: -0.02em; margin-bottom: 8px; }
    code { background: #1a1a1d; padding: 2px 6px; border-radius: 4px; }
    .muted { color: #8a8a90; font-size: 14px; line-height: 1.7; }
    .badge { display:inline-block; margin-top:16px; padding:4px 10px; border:1px solid #2a2a2e; border-radius:999px; font-size:12px; color:#a8a8ae; }
  </style>

  <style>
    /************************************
      AJUSTES DE CHATBOT
    ************************************/

    .bpFabWrapper,
    iframe.bpFab,
    iframe[name="fab"] {
        width: 190px !important;
        height: 190px !important;
        overflow: visible !important;
    }

    .bpFabWrapper {
        position: fixed !important;
        right: 9% !important;
        top: 80px !important;
    }

    .bpHeightFull {
        background-color: #fff !important;
    }

    .bpFab {
        box-shadow: 0 4px 7px rgba(0, 0, 0, 0.6) !important;
    }

    iframe.bpOpen {
        position: fixed !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
        width: min(99vw, 1024px) !important;
        height: min(90vh, 840px) !important;
        z-index: 99998 !important;
        border-radius: 16px !important;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45) !important;
        border: none !important;
    }

    body:has(iframe.bpOpen)::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.60);
        z-index: 99997;
    }

    iframe[class*="bpWebchat"] {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease-in-out;
    }

    iframe.bpOpen {
        opacity: 1;
        pointer-events: auto;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ximia · Lab</h1>
    <p class="muted">
      Página de prueba — no enlazada, <code>noindex</code>. Abrí el chat (botón abajo a la derecha).<br />
      Origen detectado: <code id="origin">…</code><br />
      En <code>construirfacil.com</code> debería resolver <b>catalog-mode</b> ("Bienvenido a ConstruirFácil").
    </p>
    <div class="badge">segunda instancia de Ximia · catalog-mode</div>
  </div>

  <!-- Botpress Webchat v3.3 (mismo bot único) -->
  <script src="https://cdn.botpress.cloud/webchat/v3.3/inject.js?v=2" defer></script>
  <script src="https://files.bpcontent.cloud/2026/02/09/15/20260209155612-JRZYC1GZ.js" defer></script>

  <!-- Paso 2: pasar el origen (host de esta página) a Botpress como custom data -->
  <script>
    (function () {
      var origin = window.location.hostname; // construirfacil.com (o el host donde se sirva)
      var el = document.getElementById('origin');
      if (el) el.textContent = origin;
      function attach() {
        try { window.botpress.updateUser({ data: { origin: origin } }); }
        catch (e) { console.warn('Ximia origin updateUser falló:', e); }
      }
      var tries = 0;
      var t = setInterval(function () {
        tries++;
        if (window.botpress && window.botpress.on) { clearInterval(t); window.botpress.on('webchat:initialized', attach); }
        else if (tries > 50) { clearInterval(t); } // ~10s de gracia
      }, 200);
    })();
  </script>
</body>
</html>
