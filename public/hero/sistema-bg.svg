<?xml version="1.0" encoding="UTF-8"?>
<!--
  HeroRow / Slide principal — Manifesto editorial.
  Composición en blueprint con una casa modular ensamblándose. Líneas más
  gruesas, contraste alto y acento rojo CF dominante para que se lea como
  hero (no como diagrama técnico). Vector puro, no se confunde con las
  fotos raster del catálogo.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1600 900"
     preserveAspectRatio="xMidYMid slice"
     width="100%" height="100%">

  <defs>
    <!-- Bg radial: oscuro con un halo más cálido en el cuadrante derecho
         para que la casa quede iluminada. -->
    <radialGradient id="bg" cx="68%" cy="48%" r="65%">
      <stop offset="0%"  stop-color="#1f1d22"/>
      <stop offset="55%" stop-color="#0e0d10"/>
      <stop offset="100%" stop-color="#050507"/>
    </radialGradient>

    <!-- Grilla técnica más visible -->
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>

    <!-- Spotlight en la zona de la casa para resaltarla -->
    <radialGradient id="spot" cx="68%" cy="50%" r="38%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Capa 1: bg + grid + spotlight -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#spot)"/>

  <!-- Capa 2: casa isométrica grande, más a la derecha (deja espacio al  -->
  <!-- aside de la izquierda). Trazo grueso + color rojo en bordes claves. -->
  <g transform="translate(1100,500)" stroke-linejoin="round" stroke-linecap="round" fill="none">

    <!-- Platea con sombra leve -->
    <g stroke="#ffffff" stroke-opacity="0.32" stroke-width="2">
      <polygon points="-360,200 0,380 360,200 0,20" fill="#ffffff" fill-opacity="0.025"/>
      <polygon points="-360,200 -360,232 0,412 0,380" fill="#ffffff" fill-opacity="0.06"/>
      <polygon points="360,200 360,232 0,412 0,380" fill="#ffffff" fill-opacity="0.06"/>
    </g>

    <!-- Caja izquierda: módulo planta baja -->
    <g stroke="#ffffff" stroke-opacity="0.92" stroke-width="2.6">
      <polygon points="-360,200 -360,-60 -130,-170 -130,90"/>
      <polygon points="-360,200 -130,90 0,20 -230,-90"/>
      <polygon points="-130,90 -130,-170 0,-230 0,20"/>
    </g>
    <!-- Detalle ventana izq -->
    <g stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.4">
      <line x1="-280" y1="100" x2="-280" y2="-30"/>
      <line x1="-200" y1="60"  x2="-200" y2="-70"/>
    </g>

    <!-- Caja derecha: módulo planta alta más volumen -->
    <g stroke="#ffffff" stroke-opacity="0.92" stroke-width="2.6">
      <polygon points="0,20 0,-260 230,-150 230,140"/>
      <polygon points="0,20 230,140 360,80 130,-40"/>
      <polygon points="230,140 230,-150 360,-220 360,80"/>
    </g>
    <!-- Ventanas der -->
    <g stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.4">
      <line x1="80"  y1="-10"  x2="80"  y2="-150"/>
      <line x1="160" y1="-50"  x2="160" y2="-190"/>
    </g>

    <!-- Casaparte FLOTANDO arriba — desciende para ensamblar. Acento rojo -->
    <g transform="translate(140,-300)" stroke="#ff003d" stroke-width="2.4">
      <polygon points="0,0 0,-100 130,-160 130,-60" fill="#ff003d" fill-opacity="0.06"/>
      <polygon points="0,0 130,-60 260,-120 130,-160"/>
      <polygon points="130,-60 130,-160 260,-220 260,-120"/>
    </g>
    <!-- Trayectoria de descenso (línea punteada roja) -->
    <line x1="220" y1="-340" x2="220" y2="-200"
          stroke="#ff003d" stroke-opacity="0.95"
          stroke-width="2" stroke-dasharray="6,7"/>

    <!-- Nodos de ensamblaje en rojo -->
    <g fill="#ff003d">
      <circle cx="-130" cy="-170" r="6"/>
      <circle cx="0"    cy="-260" r="6"/>
      <circle cx="230"  cy="-150" r="6"/>
      <circle cx="0"    cy="20"   r="6"/>
      <circle cx="360"  cy="80"   r="6"/>
    </g>
    <g fill="none" stroke="#ff003d" stroke-width="1" stroke-opacity="0.45">
      <circle cx="-130" cy="-170" r="14"/>
      <circle cx="230"  cy="-150" r="14"/>
      <circle cx="360"  cy="80"   r="14"/>
    </g>

    <!-- Cotas / dimensiones -->
    <g stroke="#ffffff" stroke-opacity="0.34" stroke-width="1">
      <line x1="-380" y1="220" x2="-380" y2="-80"/>
      <line x1="-392" y1="220" x2="-368" y2="220"/>
      <line x1="-392" y1="-80" x2="-368" y2="-80"/>
    </g>
  </g>

  <!-- Capa 3: tipografía técnica top-right -->
  <g fill="#ffffff" fill-opacity="0.4"
     font-family="ui-monospace, 'SF Mono', monospace" font-size="13"
     letter-spacing="0.18em">
    <text x="1430" y="60">FLEX BUILD SUITE</text>
  </g>
  <g fill="#ffffff" fill-opacity="0.22"
     font-family="ui-monospace, 'SF Mono', monospace" font-size="11"
     letter-spacing="0.16em">
    <text x="1430" y="80">SCALE 1:50 · MOD-A · MOD-B</text>
    <text x="1430" y="98">HAUSIND®</text>
  </g>

  <!-- Capa 4: viñeta lateral izquierda — ayuda a integrar el aside glass -->
  <linearGradient id="vignette" x1="0%" x2="50%" y1="0%" y2="0%">
    <stop offset="0%" stop-color="#000" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </linearGradient>
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
