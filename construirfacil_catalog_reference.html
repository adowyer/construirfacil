<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSTRUIRFACIL — Proyectos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ---------- Reset ---------- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:'Geist','Helvetica Neue',Arial,sans-serif;
  font-weight:400;
  color:#0a0a0a;
  background:#fff;
  font-size:14px;
  line-height:1.4;
  letter-spacing:-0.005em;
}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
img{display:block;max-width:100%;height:auto}

/* ---------- Top nav ---------- */
.topnav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;
  height:54px;padding:0 24px;
  background:#fff;
  border-bottom:1px solid #eee;
}
.topnav .brand{
  font-weight:600;font-size:14px;
  letter-spacing:0.02em;
  margin-right:40px;
}
.topnav nav{display:flex;gap:28px;flex:1}
.topnav nav a{
  font-size:13px;font-weight:400;
  color:#0a0a0a;
  position:relative;padding:4px 0;
  transition:opacity .2s ease;
}
.topnav nav a:hover{opacity:.55}
.topnav nav a.active{font-weight:500}
.topnav .contact{
  font-size:13px;
  padding:6px 14px;
  border:1px solid #0a0a0a;
  border-radius:100px;
  transition:background .2s ease,color .2s ease;
}
.topnav .contact:hover{background:#0a0a0a;color:#fff}

/* ---------- Layout ---------- */
.layout{
  display:grid;
  grid-template-columns:220px 1fr;
  min-height:calc(100vh - 54px);
}

/* ---------- Sidebar ---------- */
.sidebar{
  border-right:1px solid #eee;
  padding:28px 20px;
  position:sticky;top:54px;
  height:calc(100vh - 54px);
  overflow-y:auto;
}
.sidebar h4{
  font-size:11px;font-weight:500;
  text-transform:uppercase;letter-spacing:0.08em;
  color:#999;
  margin-bottom:14px;
}
.cat-group{margin-bottom:22px}
.cat-main{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;
  padding:6px 0;
  font-size:14px;font-weight:500;
  transition:opacity .2s ease;
}
.cat-main:hover{opacity:.6}
.cat-main .plus{
  font-size:16px;font-weight:300;
  transition:transform .25s ease;
  display:inline-block;
  color:#666;
}
.cat-group.open .cat-main .plus{transform:rotate(45deg)}
.cat-sub{
  max-height:0;overflow:hidden;
  transition:max-height .35s ease;
}
.cat-group.open .cat-sub{max-height:400px}
.cat-sub button{
  display:block;width:100%;text-align:left;
  padding:5px 0 5px 10px;
  font-size:13px;font-weight:400;
  color:#555;
  transition:color .2s ease;
}
.cat-sub button:hover{color:#0a0a0a}
.cat-sub button.active{color:#0a0a0a;font-weight:500}

/* ---------- Grid ---------- */
.grid-wrap{padding:0}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;
  background:#eee;
}
.card{
  position:relative;
  background:#fff;
  aspect-ratio:4/3;
  overflow:hidden;
  cursor:pointer;
  display:block;
  transition:opacity .3s ease;
}
.card.hidden{display:none}
.card.fading{opacity:0}

/* Image wrapper */
.card .img-wrap{
  position:absolute;inset:0;
  overflow:hidden;
  background:#f4f4f4;
}
.card .lqip,
.card img.real{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  transition:transform .7s cubic-bezier(.2,.8,.2,1),opacity .6s ease;
}
.card .lqip{
  filter:blur(18px);
  transform:scale(1.08);
  opacity:1;
  z-index:1;
}
.card img.real{opacity:0;z-index:2}
.card.loaded img.real{opacity:1}
.card.loaded .lqip{opacity:0}
.card:hover img.real{transform:scale(1.04)}

/* Meta block — sits over bottom-left of image */
.card .meta{
  position:absolute;left:0;right:0;bottom:0;
  z-index:3;
  padding:16px 18px 16px;
  color:#fff;
  background:linear-gradient(to top,rgba(0,0,0,.55),rgba(0,0,0,0));
  display:flex;align-items:flex-end;gap:12px;
  min-height:40%;
}
.card .icon{
  width:44px;height:44px;flex-shrink:0;
  background:#fff;
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  padding:6px;
}
.card .icon svg{width:100%;height:100%}
.card .text{flex:1;min-width:0}
.card .title{
  font-size:16px;font-weight:500;
  letter-spacing:-0.01em;line-height:1.2;
  margin-bottom:4px;
}
.card .loc{
  font-size:12px;font-weight:400;
  opacity:.82;
  letter-spacing:0.01em;
}

/* Load more */
.load-more-wrap{
  text-align:center;padding:48px 0 80px;
  border-top:1px solid #eee;
}
.load-more{
  font-size:13px;font-weight:500;
  letter-spacing:0.04em;text-transform:uppercase;
  padding:14px 36px;
  border:1px solid #0a0a0a;
  border-radius:100px;
  transition:background .2s ease,color .2s ease;
}
.load-more:hover{background:#0a0a0a;color:#fff}
.load-more:disabled{opacity:.3;cursor:not-allowed}

/* Filter banner */
.filter-status{
  display:none;
  padding:16px 24px;
  border-bottom:1px solid #eee;
  font-size:13px;
  background:#fafafa;
}
.filter-status.visible{display:flex;align-items:center;justify-content:space-between}
.filter-status .clear{
  font-size:12px;letter-spacing:0.04em;text-transform:uppercase;
  color:#666;
}
.filter-status .clear:hover{color:#0a0a0a}

/* ---------- Responsive ---------- */
@media (max-width:1100px){
  .grid{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:720px){
  .layout{grid-template-columns:1fr}
  .sidebar{
    position:static;height:auto;
    border-right:none;border-bottom:1px solid #eee;
    padding:16px 20px;
  }
  .grid{grid-template-columns:1fr}
  .topnav{padding:0 16px}
  .topnav nav{gap:18px}
  .topnav nav a{font-size:12px}
}
</style>
</head>
<body>

<!-- ============ TOP NAV ============ -->
<header class="topnav">
  <a href="#" class="brand">CONSTRUIRFACIL</a>
  <nav>
    <a href="#" class="active">Proyectos</a>
    <a href="#">Novedades</a>
    <a href="#">Nosotros</a>
    <a href="#">Financiación</a>
    <a href="#">Blog</a>
  </nav>
  <a href="#" class="contact">Contacto</a>
</header>

<div class="layout">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <h4>Categorías</h4>

    <div class="cat-group open" data-cat="residencial">
      <button class="cat-main">
        Residencial
        <span class="plus">+</span>
      </button>
      <div class="cat-sub">
        <button data-filter="casa">Casas</button>
        <button data-filter="depto">Departamentos</button>
        <button data-filter="duplex">Dúplex</button>
        <button data-filter="ph">PH</button>
      </div>
    </div>

    <div class="cat-group" data-cat="barrios">
      <button class="cat-main">
        Barrios cerrados
        <span class="plus">+</span>
      </button>
      <div class="cat-sub">
        <button data-filter="country">Country</button>
        <button data-filter="privado">Barrio privado</button>
        <button data-filter="nautico">Náutico</button>
      </div>
    </div>

    <div class="cat-group" data-cat="lotes">
      <button class="cat-main">
        Lotes
        <span class="plus">+</span>
      </button>
      <div class="cat-sub">
        <button data-filter="lote-urbano">Urbano</button>
        <button data-filter="lote-suburbano">Suburbano</button>
      </div>
    </div>

    <div class="cat-group" data-cat="estado">
      <button class="cat-main">
        Estado
        <span class="plus">+</span>
      </button>
      <div class="cat-sub">
        <button data-filter="pozo">En pozo</button>
        <button data-filter="construccion">En construcción</button>
        <button data-filter="terminado">Terminado</button>
      </div>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <main class="grid-wrap">
    <div class="filter-status" id="filterStatus">
      <span id="filterLabel"></span>
      <button class="clear" id="clearFilter">Quitar filtro ×</button>
    </div>

    <section class="grid" id="grid"></section>

    <div class="load-more-wrap">
      <button class="load-more" id="loadMore">Cargar más</button>
    </div>
  </main>
</div>

<script>
/* ------------------------------------------------------------------
   Sample project data — Argentine real estate
-------------------------------------------------------------------*/
const PROJECTS = [
  {id:'posadas',    name:'Posadas al Río',          loc:'Escobar, Buenos Aires',       tags:['casa','privado','construccion'],    seed:'posadasrio',  lqip:'#8a9b7a'},
  {id:'alamos',     name:'Los Álamos 42',           loc:'Nordelta, Tigre',             tags:['casa','country','terminado'],        seed:'alamos42',    lqip:'#6c7a8a'},
  {id:'palermo',    name:'Casa Palermo Soho',       loc:'Palermo, CABA',               tags:['casa','terminado'],                  seed:'palermosoho', lqip:'#b4a582'},
  {id:'belgrano',   name:'Residencia Belgrano R',   loc:'Belgrano, CABA',              tags:['casa','terminado'],                  seed:'belgranor',   lqip:'#9a8a78'},
  {id:'tigre',      name:'Terrazas de Tigre',       loc:'Tigre, Buenos Aires',         tags:['depto','nautico','construccion'],    seed:'terrazas',    lqip:'#7c9aab'},
  {id:'pilar',      name:'El Retiro Country',       loc:'Pilar, Buenos Aires',         tags:['casa','country','terminado'],        seed:'elretiro',   lqip:'#8ea074'},
  {id:'costa',      name:'Costa Escobar',           loc:'Escobar, Buenos Aires',       tags:['depto','nautico','pozo'],            seed:'costaesc',   lqip:'#6a8a9a'},
  {id:'adelina',    name:'Villa Adelina Home',      loc:'Villa Adelina, San Isidro',   tags:['duplex','construccion'],             seed:'adelina',    lqip:'#a89878'},
  {id:'sanisidro',  name:'San Isidro Compound',     loc:'San Isidro, Buenos Aires',    tags:['casa','privado','terminado'],        seed:'sanisidro',  lqip:'#7a8a6a'},
  {id:'lote-nord',  name:'Lote Premium Nordelta',   loc:'Nordelta, Tigre',             tags:['lote-suburbano','country'],          seed:'lotenord',   lqip:'#909a78'},
  {id:'madero',     name:'Dúplex Puerto Madero',    loc:'Puerto Madero, CABA',         tags:['duplex','depto','terminado'],        seed:'madero',     lqip:'#506878'},
  {id:'canuelas',   name:'Casa Cañuelas Chica',     loc:'Cañuelas, Buenos Aires',      tags:['casa','lote-suburbano','terminado'], seed:'canuelas',   lqip:'#9a9a7a'},
  {id:'recoleta',   name:'PH Recoleta 1890',        loc:'Recoleta, CABA',              tags:['ph','terminado'],                    seed:'recoleta',   lqip:'#b49878'},
  {id:'lujan',      name:'Haras de Luján',          loc:'Luján, Buenos Aires',         tags:['casa','country','terminado'],        seed:'haraslujan', lqip:'#8a9868'},
  {id:'ezeiza',     name:'Barrio Ezeiza Norte',     loc:'Ezeiza, Buenos Aires',        tags:['casa','privado','construccion'],     seed:'ezeiza',     lqip:'#789a88'},
  {id:'canning',    name:'Canning Residences',      loc:'Canning, Ezeiza',             tags:['casa','country','construccion'],     seed:'canning',    lqip:'#8c9878'},
  {id:'colegiales', name:'Colegiales Lofts',        loc:'Colegiales, CABA',            tags:['depto','terminado'],                 seed:'colegiales', lqip:'#a8a096'},
  {id:'rosario',    name:'Casa Rosario Norte',      loc:'Rosario, Santa Fe',           tags:['casa','terminado'],                  seed:'rosarionor', lqip:'#8a7868'},
  {id:'chascomus',  name:'Chascomús Lakefront',     loc:'Chascomús, Buenos Aires',     tags:['casa','nautico','pozo'],             seed:'chascomus',  lqip:'#6c8a9c'},
  {id:'villagesell',name:'Villa Gesell Dunes',      loc:'Villa Gesell, Buenos Aires',  tags:['depto','nautico','terminado'],       seed:'gesell',     lqip:'#c8b898'},
  {id:'mardel',     name:'Mar del Plata Tower',     loc:'Mar del Plata, Buenos Aires', tags:['depto','terminado'],                 seed:'mardel',     lqip:'#7a8898'},
  {id:'mendoza',    name:'Viñedos Mendoza Lote',    loc:'Luján de Cuyo, Mendoza',      tags:['lote-suburbano','country'],          seed:'mendoza',    lqip:'#a87868'}
];

/* ------------------------------------------------------------------
   Tiny geometric SVG icons — generated per project
-------------------------------------------------------------------*/
function iconFor(id, seed){
  // deterministic pseudo-random
  let h = 0; for(let i=0;i<seed.length;i++) h = (h*31 + seed.charCodeAt(i)) & 0xffff;
  const shape = h % 5;
  const svgs = [
    // 0: house
    `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M16 4 L28 14 L28 28 L4 28 L4 14 Z" fill="none" stroke="#0a0a0a" stroke-width="2"/></svg>`,
    // 1: circle in square
    `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="4" width="24" height="24" fill="none" stroke="#0a0a0a" stroke-width="2"/><circle cx="16" cy="16" r="7" fill="#0a0a0a"/></svg>`,
    // 2: diagonal lines
    `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M4 28 L28 4 M4 20 L20 4 M12 28 L28 12" stroke="#0a0a0a" stroke-width="2"/></svg>`,
    // 3: triangle
    `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M16 5 L28 27 L4 27 Z" fill="#0a0a0a"/></svg>`,
    // 4: stacked rectangles
    `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="6" width="24" height="8" fill="#0a0a0a"/><rect x="4" y="18" width="24" height="8" fill="none" stroke="#0a0a0a" stroke-width="2"/></svg>`
  ];
  return svgs[shape];
}

/* ------------------------------------------------------------------
   LQIP placeholder — tiny inline SVG, one solid color
-------------------------------------------------------------------*/
function lqipDataUri(hex){
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='8' height='6'><rect width='8' height='6' fill='${hex}'/></svg>`;
  return 'data:image/svg+xml;utf8,'+encodeURIComponent(svg);
}

/* ------------------------------------------------------------------
   Real image URL — picsum.photos with seed for consistency
-------------------------------------------------------------------*/
function realImageUrl(seed, w, h){
  return `https://picsum.photos/seed/${seed}/${w}/${h}`;
}

/* ------------------------------------------------------------------
   Render cards
-------------------------------------------------------------------*/
const grid = document.getElementById('grid');
let activeFilter = null;
let visibleCount = 12;   // initial batch

function renderGrid(){
  grid.innerHTML = '';
  const filtered = activeFilter
    ? PROJECTS.filter(p => p.tags.includes(activeFilter))
    : PROJECTS;
  const toShow = filtered.slice(0, visibleCount);

  toShow.forEach(p => grid.appendChild(buildCard(p)));

  // Load-more button state
  const btn = document.getElementById('loadMore');
  if(visibleCount >= filtered.length){
    btn.disabled = true;
    btn.textContent = 'Fin del catálogo';
  } else {
    btn.disabled = false;
    btn.textContent = 'Cargar más';
  }
}

function buildCard(p){
  const card = document.createElement('a');
  card.className = 'card';
  card.href = '#'+p.id;

  // Image wrapper + LQIP
  const wrap = document.createElement('div');
  wrap.className = 'img-wrap';

  const lqip = document.createElement('img');
  lqip.className = 'lqip';
  lqip.src = lqipDataUri(p.lqip);
  lqip.alt = '';
  wrap.appendChild(lqip);

  const real = document.createElement('img');
  real.className = 'real';
  real.loading = 'lazy';
  real.alt = p.name;
  real.addEventListener('load', ()=> card.classList.add('loaded'));
  real.src = realImageUrl(p.seed, 800, 600);
  wrap.appendChild(real);

  card.appendChild(wrap);

  // Meta
  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.innerHTML = `
    <div class="icon">${iconFor(p.id, p.seed)}</div>
    <div class="text">
      <div class="title">${p.name}</div>
      <div class="loc">${p.loc}</div>
    </div>`;
  card.appendChild(meta);

  return card;
}

/* ------------------------------------------------------------------
   Sidebar: expand/collapse + filter
-------------------------------------------------------------------*/
document.querySelectorAll('.cat-main').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    btn.closest('.cat-group').classList.toggle('open');
  });
});

document.querySelectorAll('.cat-sub button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const filter = btn.dataset.filter;
    const already = btn.classList.contains('active');

    // clear all active states
    document.querySelectorAll('.cat-sub button.active').forEach(b=>b.classList.remove('active'));

    if(already){
      activeFilter = null;
      hideFilterBanner();
    } else {
      btn.classList.add('active');
      activeFilter = filter;
      showFilterBanner(btn.textContent);
    }
    visibleCount = 12;
    applyFilterWithFade();
  });
});

function applyFilterWithFade(){
  // fade cards out, then re-render, then fade in
  const cards = grid.querySelectorAll('.card');
  cards.forEach(c=>c.classList.add('fading'));
  setTimeout(()=>{
    renderGrid();
    requestAnimationFrame(()=>{
      grid.querySelectorAll('.card').forEach(c=>c.classList.remove('fading'));
    });
  }, 250);
}

function showFilterBanner(label){
  const bar = document.getElementById('filterStatus');
  document.getElementById('filterLabel').textContent = 'Filtrado por: '+label;
  bar.classList.add('visible');
}
function hideFilterBanner(){
  document.getElementById('filterStatus').classList.remove('visible');
}
document.getElementById('clearFilter').addEventListener('click', ()=>{
  document.querySelectorAll('.cat-sub button.active').forEach(b=>b.classList.remove('active'));
  activeFilter = null;
  hideFilterBanner();
  applyFilterWithFade();
});

/* ------------------------------------------------------------------
   Load more
-------------------------------------------------------------------*/
document.getElementById('loadMore').addEventListener('click', ()=>{
  visibleCount += 9;
  renderGrid();
});

/* ------------------------------------------------------------------
   Boot
-------------------------------------------------------------------*/
renderGrid();
</script>
</body>
</html>
